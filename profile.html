<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelTrek — User Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <h2>🌍 TravelTrek</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="packages.html">📦 Packages</a></li>
            <li><a href="itineraries.html">🗺️ Itineraries</a></li>
            <li><a href="reservations.html">🎫 Reservations</a></li>
            <li><a href="activities.html">🎯 Activities</a></li>
            <li class="active"><a href="profile.html">👤 Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn">
                <span>🚪 Sign Out</span>
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <div class="header">
            <h1>My Profile Settings</h1>
            <div class="user-info">
                <span>Logged in as: <strong id="headerUsername">User</strong></span>
            </div>
        </div>

        <!-- Profile Form Card -->
        <div class="form-card" style="max-width: 600px; margin: 0 auto 2.5rem auto;">
            <h3 class="form-title">Update Profile Account Details</h3>
            <form id="profileForm">
                <input type="hidden" id="profileId">
                <input type="hidden" id="profileActive">
                <div class="form-grid" style="grid-template-columns: 1fr; gap: 1.25rem;">
                    
                    <div class="form-group">
                        <label for="profileFullName">Full Name</label>
                        <input type="text" id="profileFullName" placeholder="Your Full Name" required>
                    </div>

                    <div class="form-group">
                        <label for="profileEmail">Email Address</label>
                        <input type="email" id="profileEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="profilePassword">New Password (or Re-type Current)</label>
                        <input type="password" id="profilePassword" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="profileRole">System Role</label>
                        <!-- Role cannot be changed by the user themselves directly on this form -->
                        <select id="profileRole" disabled>
                            <option value="TRAVELER">Traveler</option>
                            <option value="TRAVEL_AGENT">Travel Agent</option>
                            <option value="AGENCY_MANAGER">Agency Manager</option>
                        </select>
                        <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">Role modification is restricted. Contact system administrator if change is required.</span>
                    </div>
                </div>

                <div class="btn-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">Save Profile Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
