<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelTrek — Trip Itineraries</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <h2>🌍 TravelTrek</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="packages.html">📦 Packages</a></li>
            <li class="active"><a href="itineraries.html">🗺️ Itineraries</a></li>
            <li><a href="reservations.html">🎫 Reservations</a></li>
            <li><a href="activities.html">🎯 Activities</a></li>
            <li><a href="profile.html">👤 Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn">
                <span>🚪 Sign Out</span>
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <div class="header">
            <h1>Trip Itineraries Management</h1>
            <div class="user-info">
                <span>Logged in as: <strong id="headerUsername">User</strong></span>
            </div>
        </div>

        <!-- Add/Edit Form -->
        <div class="form-card">
            <h3 class="form-title" id="formTitle">Create New Trip Itinerary</h3>
            <form id="itineraryForm">
                <input type="hidden" id="itineraryId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tripName">Trip Name</label>
                        <input type="text" id="tripName" placeholder="e.g., Honeymoon in Bali" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Itinerary Status</label>
                        <select id="status" required>
                            <option value="DRAFT">Draft</option>
                            <option value="FINALIZED">Finalized</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="accountId">Linked Account / User</label>
                        <select id="accountId" required>
                            <option value="">-- Select Account --</option>
                            <!-- JS loaded -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="travelPackageId">Linked Travel Package</label>
                        <select id="travelPackageId" required>
                            <option value="">-- Select Package --</option>
                            <!-- JS loaded -->
                        </select>
                    </div>

                    <div class="form-group checkbox-group" style="padding-top: 1.5rem;">
                        <input type="checkbox" id="aiGenerated">
                        <label for="aiGenerated">Generated using TravelTrek AI Engine</label>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Clear / Cancel</button>
                    <button type="submit" id="saveBtn" class="btn btn-primary">Save Itinerary</button>
                </div>
            </form>
        </div>

        <!-- Itineraries Table Section -->
        <div class="table-section">
            <div class="table-header">
                <h3 class="form-title" style="margin-bottom: 0;">Existing Trip Itineraries</h3>
                <div class="search-input-container">
                    <input type="text" id="searchInput" placeholder="🔍 Search trip names or users...">
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Trip Name</th>
                            <th>Status</th>
                            <th>AI Gen?</th>
                            <th>Linked Account</th>
                            <th>Linked Package</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itinerariesTableBody">
                        <!-- Loaded dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/itineraries.js"></script>
</body>
</html>
